services:
  backend:
    build:
      context: ./backend
    image: backend:latest
    container_name: backend
    environment:
      - ENV=production
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - infra-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: frontend:latest
    container_name: frontend
    environment:
      - API_URL=/api
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - ${WEB_PORT:-80}:80
    networks:
      - infra-net
    restart: unless-stopped

networks:
  infra-net:
    driver: bridge
    name: infra-net
    enable_ipv6: false
    external: true
